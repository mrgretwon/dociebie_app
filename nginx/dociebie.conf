server {
    listen 80;
    server_name dociebie.pl www.dociebie.pl;
    return 301 https://dociebie.pl$request_uri;
}

server {
    listen 443 ssl;
    server_name www.dociebie.pl;

    ssl_certificate     /etc/ssl/dociebie/fullchain.pem;
    ssl_certificate_key /etc/ssl/dociebie/privkey.pem;

    return 301 https://dociebie.pl$request_uri;
}

server {
    listen 443 ssl;
    server_name dociebie.pl;

    ssl_certificate     /etc/ssl/dociebie/fullchain.pem;
    ssl_certificate_key /etc/ssl/dociebie/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 10M;

    # Static files (served by whitenoise via gunicorn)
    location /static/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Media files (user uploads, served by Django)
    location /media/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django admin
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Root — return 404 or a simple landing page
    location / {
        return 404;
    }
}
